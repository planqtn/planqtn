name: "Comment run"
on:
  issue_comment:
    types: [created, edited]
jobs:
  comment-run:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      issues: write
      pull-requests: write
      actions: write
    steps:
      - uses: actions/checkout@v4
        with: 
          token: ${{ secrets.WORKFLOW_TOKEN }}
      - uses: nwtgck/actions-comment-run@v3
        with:
          github-token: ${{ secrets.WORKFLOW_TOKEN }}
          allowed-associations: '["OWNER", "MEMBER"]'
